<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Tag Reader - Login</title>
    <link rel="stylesheet" href="/static/nfc.css">
</head>

<body class="login-page">
    <div class="login-container">
        <h1 class='login' id="form-title">Login to NFC Tag Reader</h1>

        <div id="message" class="message" style="display: none;"></div>

        <form id="auth-form">
            <input type="hidden" id="csrf_token" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required minlength="3">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>

            <button type="submit" class="btn" id="submit-btn">Login</button>
        </form>

        <div class="switch-mode">
            <span id="switch-text">Don't have an account? </span>
            <a href="#" id="switch-link">Register here</a>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        const formTitle = document.getElementById('form-title');
        const authForm = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const switchText = document.getElementById('switch-text');
        const switchLink = document.getElementById('switch-link');
        const messageDiv = document.getElementById('message');

        // Switch between login and register modes
        switchLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;

            if (isLoginMode) {
                formTitle.textContent = 'Login to NFC Tag Reader';
                submitBtn.textContent = 'Login';
                switchText.textContent = "Don't have an account? ";
                switchLink.textContent = 'Register here';
            } else {
                formTitle.textContent = 'Register for NFC Tag Reader';
                submitBtn.textContent = 'Register';
                switchText.textContent = 'Already have an account? ';
                switchLink.textContent = 'Login here';
            }

            hideMessage();
            authForm.reset();
        });

        // Handle form submission
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (username.length < 3) {
                showMessage('Username must be at least 3 characters long', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = isLoginMode ? 'Logging in...' : 'Registering...';

            try {
                const endpoint = isLoginMode ? '/api/login' : '/api/register';
                const csrfToken = document.getElementById('csrf_token').value;
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showMessage(result.message, 'success');
                    // Redirect to main page after successful login/register
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage(result.error || 'Authentication failed', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isLoginMode ? 'Login' : 'Register';
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }

        function hideMessage() {
            messageDiv.style.display = 'none';
        }
    </script>
</body>

</html>
